<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Link Bookmark</title>

    <!-- Favicon Kustom -->
    <link rel="icon" type="image/png" href="https://iili.io/BszkOKb.jpg">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        window.addEventListener('load', function() {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    darkMode: 'class',
                    theme: {
                        extend: {
                            fontFamily: {
                                sans: ['Inter', 'sans-serif'],
                                heading: ['Plus Jakarta Sans', 'sans-serif'],
                            },
                            colors: {
                                dark: {
                                    bg: '#05070A',
                                    card: '#0D111C',
                                    border: '#1E2638',
                                    input: '#121826'
                                }
                            }
                        }
                    }
                }
            }
        });
    </script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Layout Mobile Native Modern */
        html, body {
            height: 100dvh; 
            overflow: hidden;
            width: 100%;
            background-color: #FDFDFE;
            -webkit-tap-highlight-color: transparent;
        }

        .dark body { background-color: #05070A; }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom, 1rem); }
        .safe-pt { padding-top: env(safe-area-inset-top, 1rem); }

        .animate-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .nav-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-item.active {
            color: #6366f1;
        }
        .nav-item.active i {
            transform: scale(1.1) translateY(-2px);
            filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.2));
        }

        .loader {
            border: 2px solid rgba(99, 102, 241, 0.1);
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-blur {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .nav-blur {
            background: rgba(13, 17, 28, 0.9);
        }

        .premium-shadow {
            box-shadow: 0 -10px 40px -10px rgba(0, 0, 0, 0.08);
        }
        .dark .premium-shadow {
            box-shadow: 0 -10px 40px -10px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body class="text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300">

    <!-- --- Login Screen (Modern Card Design) --- -->
    <div id="login-screen" class="fixed inset-0 z-[200] bg-gradient-to-br from-blue-50 to-blue-200 dark:from-slate-900 dark:to-[#05070A] flex items-center justify-center p-6 text-center overflow-hidden transition-colors duration-300">
        
        <!-- Toggle Theme Button (Ditempatkan absolute di pojok kanan atas layar) -->
        <button onclick="app.toggleDarkMode()" class="absolute top-8 right-6 p-3 bg-white/50 dark:bg-dark-card/50 backdrop-blur-xl border border-white/40 dark:border-dark-border text-slate-600 dark:text-slate-300 rounded-full shadow-lg transition-all active:scale-90 z-50">
            <i class="theme-icon" data-lucide="moon" size="22"></i>
        </button>

        <div class="w-full max-w-[400px] bg-white dark:bg-dark-card rounded-[20px] shadow-[0_10px_25px_rgba(0,0,0,0.05)] dark:shadow-[0_10px_25px_rgba(0,0,0,0.4)] p-8 animate-in mx-auto relative z-10 transition-colors duration-300">
            <div class="mb-8">
                <div class="inline-flex w-16 h-16 bg-blue-600 rounded-2xl items-center justify-center text-white shadow-lg shadow-blue-500/20 mb-4">
                    <i data-lucide="bookmark" size="32" stroke-width="2.5"></i>
                </div>
                <h2 class="text-2xl font-black font-heading tracking-tight text-slate-800 dark:text-white">Selamat Datang</h2>
                <p class="text-slate-400 text-sm font-medium mt-1 font-heading">Kelola tautan cerdas dalam satu genggaman</p>
            </div>

            <form id="login-form" class="space-y-5 text-left">
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 ml-1 font-heading">Email</label>
                        <input required type="email" id="login-email" placeholder="nama@email.com" class="w-full px-5 py-3.5 bg-slate-50 dark:bg-dark-input border border-slate-100 dark:border-dark-border dark:text-white rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-sans">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-bold text-slate-500 ml-1 font-heading">Password</label>
                        <input required type="password" id="login-password" placeholder="••••••••" class="w-full px-5 py-3.5 bg-slate-50 dark:bg-dark-input border border-slate-100 dark:border-dark-border dark:text-white rounded-xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm font-sans">
                    </div>
                </div>

                <div class="flex justify-end">
                    <button type="button" class="text-xs font-semibold text-blue-600 dark:text-blue-400 hover:underline font-heading">Lupa password?</button>
                </div>

                <div id="login-error" class="hidden text-red-500 text-[11px] font-bold text-center py-1 font-heading">Kredensial tidak valid. Silakan coba lagi.</div>

                <button type="submit" class="w-full py-4 bg-gradient-to-r from-blue-500 to-blue-700 text-white rounded-[12px] font-bold text-base shadow-lg shadow-blue-500/20 active:scale-95 transition-all font-heading">Masuk</button>
            </form>
        </div>
        
        <!-- Decorative Ambient Background Elements -->
        <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-400/20 dark:bg-blue-600/10 rounded-full blur-[100px] transition-colors duration-300"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-400/20 dark:bg-indigo-600/10 rounded-full blur-[100px] transition-colors duration-300"></div>
    </div>

    <!-- --- Main App Container --- -->
    <div id="app-content" class="hidden flex flex-col h-full w-full">
        
        <!-- Header (Fixed Top) -->
        <header class="flex-none safe-pt bg-white/95 dark:bg-dark-bg/95 backdrop-blur-xl border-b border-slate-50 dark:border-dark-border px-6 py-5 space-y-5 z-40">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                        <i data-lucide="bookmark" size="20" stroke-width="2.5"></i>
                    </div>
                    <h1 class="text-2xl font-black font-heading tracking-tighter text-left">LinkKeeper</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="app.toggleDarkMode()" class="p-2.5 bg-slate-50 dark:bg-dark-input text-slate-400 rounded-2xl transition-all active:scale-90">
                        <i class="theme-icon" data-lucide="moon" size="20"></i>
                    </button>
                </div>
            </div>

            <!-- Search -->
            <div class="relative group">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors" size="18"></i>
                <input type="text" id="search-input" placeholder="Cari bookmark Anda..." class="w-full pl-12 pr-4 py-4 bg-slate-100 dark:bg-dark-input border-transparent border focus:border-indigo-500 rounded-2xl transition-all outline-none text-sm font-medium">
            </div>

            <!-- Horizontal Filters -->
            <div id="category-filters" class="flex gap-2 overflow-x-auto pb-1 scrollbar-hide"></div>
        </header>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto px-6 py-6 scrollbar-hide">
            <div class="flex justify-between items-center mb-6">
                <p id="item-count" class="text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] text-left">0 Bookmarks</p>
                <div id="sync-status" class="flex items-center"></div>
            </div>
            
            <!-- Links List -->
            <div id="links-container" class="grid grid-cols-1 gap-4"></div>
            
            <!-- Extra spacer for bottom nav -->
            <div class="h-32"></div>
        </main>

        <!-- Bottom Navigation (Fixed Sticky Footer) -->
        <nav class="flex-none nav-blur premium-shadow border-t border-slate-100 dark:border-dark-border px-8 pt-4 pb-safe-area z-50">
            <div class="flex justify-between items-center max-w-lg mx-auto relative h-16">
                <button onclick="app.setActiveTab('dashboard')" id="nav-dashboard" class="nav-item flex flex-col items-center gap-1.5 text-slate-400">
                    <i data-lucide="layout-grid" size="24"></i>
                    <span class="text-[10px] font-bold tracking-wide">Utama</span>
                </button>
                
                <button onclick="app.setActiveTab('favorites')" id="nav-favorites" class="nav-item flex flex-col items-center gap-1.5 text-slate-400">
                    <i data-lucide="star" size="24"></i>
                    <span class="text-[10px] font-bold tracking-wide">Favorit</span>
                </button>

                <!-- Floating Central Button -->
                <div class="relative -translate-y-6">
                    <button onclick="app.openModal()" class="w-16 h-16 bg-indigo-600 text-white rounded-3xl shadow-2xl shadow-indigo-500/40 flex items-center justify-center border-4 border-white dark:border-dark-bg active:scale-90 transition-all">
                        <i data-lucide="plus" size="32" stroke-width="3"></i>
                    </button>
                </div>

                <button onclick="app.setActiveTab('history')" id="nav-history" class="nav-item flex flex-col items-center gap-1.5 text-slate-400">
                    <i data-lucide="clock" size="24"></i>
                    <span class="text-[10px] font-bold tracking-wide">Terbaru</span>
                </button>

                <button onclick="app.logout()" class="flex flex-col items-center gap-1.5 text-slate-300 dark:text-slate-700 hover:text-red-500 transition-all">
                    <i data-lucide="log-out" size="24"></i>
                    <span class="text-[10px] font-bold tracking-wide">Keluar</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- Modals -->
    <div id="add-modal" class="hidden fixed inset-0 z-[210] flex items-end sm:items-center justify-center p-0 sm:p-6">
        <div class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onclick="app.closeModal()"></div>
        <div class="relative w-full max-w-lg bg-white dark:bg-dark-card rounded-t-[40px] sm:rounded-[40px] p-8 space-y-8 animate-in safe-pb text-left">
            <div class="flex justify-between items-center">
                <h3 class="text-2xl font-black font-heading tracking-tight text-left">Bookmark Baru</h3>
                <button onclick="app.closeModal()" class="p-2 bg-slate-50 dark:bg-dark-input rounded-full text-slate-400"><i data-lucide="x" size="20"></i></button>
            </div>
            <form id="add-link-form" class="space-y-6 text-left">
                <div class="space-y-3">
                    <label class="text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1 text-left block">Alamat URL</label>
                    <input required type="url" id="modal-url" placeholder="https://..." class="w-full px-5 py-4 bg-slate-50 dark:bg-dark-input border border-transparent focus:border-indigo-500 rounded-2xl outline-none transition-all">
                </div>
                <div class="space-y-3">
                    <label class="text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1 text-left block">Judul Tautan</label>
                    <input type="text" id="modal-title" placeholder="Contoh: GitHub Ahmad" class="w-full px-5 py-4 bg-slate-50 dark:bg-dark-input border border-transparent focus:border-indigo-500 rounded-2xl outline-none transition-all">
                </div>
                <div class="space-y-3">
                    <label class="text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest ml-1 text-left block">Kategori</label>
                    <div id="modal-category-options" class="grid grid-cols-2 gap-2"></div>
                </div>
                <button type="submit" id="submit-btn" class="w-full py-5 bg-indigo-600 text-white rounded-[24px] font-black text-lg shadow-xl shadow-indigo-500/20 active:scale-95 transition-all">Simpan Bookmark</button>
            </form>
        </div>
    </div>

    <script>
        const CATEGORIES = ['Semua', 'Kerja', 'Kuliah', 'Hiburan', 'Tools', 'Referensi'];

        class LinkKeeperApp {
            constructor() {
                this.apiUrl = "https://script.google.com/macros/s/AKfycbz7aZgQRoQun52b2v9X3UdofT22M8MozlItbhOk69Sp-rI5f2gI-WswrV8Ovxt5d9zO/exec";
                this.links = [];
                this.activeTab = 'dashboard';
                this.selectedCategory = 'Semua';
                this.selectedModalCategory = 'Kerja';
                this.searchQuery = '';
                this.isLoggedIn = localStorage.getItem('lk_isLoggedIn') === 'true';
                this.isDarkMode = localStorage.getItem('lk_theme') === 'dark';
                this.init();
            }

            async init() {
                if (this.isDarkMode) {
                    document.documentElement.classList.add('dark');
                    // Ganti ikon ke mode matahari jika inisiasi sudah dark mode
                    document.querySelectorAll('.theme-icon').forEach(icon => {
                        icon.setAttribute('data-lucide', 'sun');
                    });
                }
                
                if (this.isLoggedIn) {
                    this.showMainApp();
                    await this.fetchLinks();
                } else {
                    this.showLoginScreen();
                }
                this.setupEventListeners();
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            async fetchLinks() {
                this.setSyncStatus(true);
                try {
                    const res = await fetch(this.apiUrl);
                    const data = await res.json();
                    this.links = Array.isArray(data) ? data.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0)) : [];
                    this.renderLinks();
                } catch (e) { console.error(e); }
                finally { this.setSyncStatus(false); }
            }

            setSyncStatus(isLoading) {
                const el = document.getElementById('sync-status');
                if (!el) return;
                el.innerHTML = isLoading ? '<div class="loader"></div>' : '<i data-lucide="check" class="text-green-500" size="14"></i>';
                if (typeof lucide !== 'undefined') lucide.createIcons();
            }

            setupEventListeners() {
                document.getElementById('login-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    const pass = document.getElementById('login-password').value;
                    if (email === 'ahmadasepsuhendi@gmail.com' && pass === 'admin') {
                        this.isLoggedIn = true;
                        localStorage.setItem('lk_isLoggedIn', 'true');
                        this.showMainApp();
                        this.fetchLinks();
                    } else {
                        document.getElementById('login-error').classList.remove('hidden');
                    }
                });
                document.getElementById('search-input').addEventListener('input', (e) => {
                    this.searchQuery = e.target.value.toLowerCase();
                    this.renderLinks();
                });
                document.getElementById('add-link-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleAddLink();
                });
            }

            renderLinks() {
                const container = document.getElementById('links-container');
                if (!container) return;

                const filtered = this.links.filter(l => {
                    const titleStr = String(l.title || '').toLowerCase();
                    const matchesSearch = titleStr.includes(this.searchQuery);
                    const matchesCat = this.selectedCategory === 'Semua' || l.category === this.selectedCategory;
                    
                    if (this.activeTab === 'favorites') return l.isFavorite && matchesSearch;
                    if (this.activeTab === 'history') return matchesSearch;
                    return matchesSearch && matchesCat;
                });

                const countEl = document.getElementById('item-count');
                if (countEl) countEl.innerText = `${filtered.length} Bookmarks`;

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="py-32 text-center opacity-25 animate-in"><i data-lucide="inbox" class="mx-auto mb-5" size="64" stroke-width="1.5"></i><p class="font-black text-lg text-slate-800 dark:text-white">Belum ada tautan</p></div>`;
                    lucide.createIcons();
                    return;
                }

                container.innerHTML = filtered.map(link => {
                    let domain = 'link'; try { domain = new URL(link.url).hostname; } catch(e){}
                    const favicon = `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
                    return `
                        <div class="bg-white dark:bg-dark-card p-5 rounded-[32px] border border-slate-50 dark:border-dark-border shadow-sm flex items-center gap-5 animate-in relative group transition-all active:scale-[0.98]">
                            <div class="w-14 h-14 bg-slate-50 dark:bg-dark-input rounded-2xl flex items-center justify-center flex-shrink-0">
                                <img src="${favicon}" class="w-8 h-8 object-contain" onerror="this.src='https://lucide.dev/api/icons/link'">
                            </div>
                            <div class="flex-1 min-w-0 text-left">
                                <span class="text-[10px] font-black uppercase text-indigo-500 tracking-wider mb-1 block text-left">${link.category}</span>
                                <h3 class="font-bold text-[15px] truncate leading-tight mb-3 text-left text-slate-800 dark:text-white">${link.title}</h3>
                                <div>
                                    <a href="${link.url}" target="_blank" class="text-[12px] font-black text-indigo-600 dark:text-indigo-400 flex items-center gap-1.5 inline-flex"><i data-lucide="external-link" size="14"></i> Buka Link</a>
                                </div>
                            </div>
                            <div class="flex flex-col gap-4">
                                <button onclick="app.toggleFavorite('${link.id}')" class="transition-all ${link.isFavorite ? 'text-yellow-500' : 'text-slate-200'}">
                                    <i data-lucide="star" size="22" fill="${link.isFavorite ? 'currentColor' : 'none'}"></i>
                                </button>
                                <button onclick="app.deleteLink('${link.id}')" class="text-slate-100 dark:text-slate-800 hover:text-red-500 dark:hover:text-red-400 transition-all"><i data-lucide="trash-2" size="20"></i></button>
                            </div>
                        </div>`;
                }).join('');
                lucide.createIcons();
            }

            setActiveTab(tab) {
                this.activeTab = tab;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                const activeEl = document.getElementById(`nav-${tab}`);
                if (activeEl) activeEl.classList.add('active');
                this.renderUI();
            }

            renderUI() {
                this.renderCategoryFilters();
                this.renderLinks();
            }

            renderCategoryFilters() {
                const container = document.getElementById('category-filters');
                if (!container) return;
                container.innerHTML = CATEGORIES.map(cat => `
                    <button onclick="app.setCategory('${cat}')" class="px-6 py-2.5 rounded-[18px] text-[13px] font-bold whitespace-nowrap transition-all border ${this.selectedCategory === cat ? 'bg-indigo-600 border-indigo-600 text-white shadow-lg' : 'bg-white dark:bg-dark-card text-slate-500 border-slate-100 dark:border-dark-border'}">${cat}</button>
                `).join('');
            }

            setCategory(cat) { this.selectedCategory = cat; this.renderUI(); }
            showLoginScreen() { document.getElementById('login-screen').classList.remove('hidden'); document.getElementById('app-content').classList.add('hidden'); }
            showMainApp() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); this.setActiveTab('dashboard'); }
            
            toggleDarkMode() { 
                this.isDarkMode = !this.isDarkMode; 
                document.documentElement.classList.toggle('dark', this.isDarkMode); 
                localStorage.setItem('lk_theme', this.isDarkMode ? 'dark' : 'light'); 
                
                // Update semua icon theme (di login dan di header utama)
                document.querySelectorAll('.theme-icon').forEach(icon => {
                    icon.setAttribute('data-lucide', this.isDarkMode ? 'sun' : 'moon'); 
                });
                lucide.createIcons(); 
            }

            openModal() { document.getElementById('add-modal').classList.remove('hidden'); this.renderModalCategories(); }
            closeModal() { document.getElementById('add-modal').classList.add('hidden'); }
            logout() { localStorage.removeItem('lk_isLoggedIn'); location.reload(); }

            async handleAddLink() {
                const urlInput = document.getElementById('modal-url');
                const titleInput = document.getElementById('modal-title');
                const btn = document.getElementById('submit-btn');
                if (!urlInput.value) return;

                btn.disabled = true; btn.innerText = "Sinkronisasi Sheets...";
                const newLink = { 
                    id: Date.now().toString(), 
                    title: titleInput.value || new URL(urlInput.value).hostname, 
                    url: urlInput.value, 
                    category: this.selectedModalCategory, 
                    isFavorite: false, 
                    createdAt: Date.now() 
                };

                try { 
                    await fetch(this.apiUrl, { method: "POST", body: JSON.stringify({ action: "add", data: newLink }) }); 
                    this.links.unshift(newLink); 
                    this.closeModal(); 
                    this.renderLinks(); 
                    urlInput.value = ""; titleInput.value = "";
                } catch(e){ alert("Gagal koneksi database."); } 
                finally { btn.disabled = false; btn.innerText = "Simpan Bookmark"; }
            }

            async toggleFavorite(id) { 
                this.links = this.links.map(l => l.id == id ? {...l, isFavorite: !l.isFavorite} : l); 
                this.renderLinks(); 
                await fetch(this.apiUrl, { method: "POST", body: JSON.stringify({ action: "toggleFavorite", id }) }); 
            }

            async deleteLink(id) { 
                if(!confirm("Hapus tautan dari database?")) return; 
                this.links = this.links.filter(l => l.id != id); 
                this.renderLinks(); 
                await fetch(this.apiUrl, { method: "POST", body: JSON.stringify({ action: "delete", id }) }); 
            }

            renderModalCategories() { 
                const container = document.getElementById('modal-category-options'); 
                if (!container) return;
                container.innerHTML = CATEGORIES.filter(c => c !== 'Semua').map(cat => `
                    <button type="button" onclick="app.selectedModalCategory = '${cat}'; app.renderModalCategories()" class="px-4 py-4 rounded-2xl text-[13px] font-bold border transition-all ${this.selectedModalCategory === cat ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-slate-50 dark:bg-dark-input text-slate-400 border-transparent'} text-center font-heading">${cat}</button>
                `).join(''); 
            }
        }

        window.app = new LinkKeeperApp();
    </script>
</body>
</html>
